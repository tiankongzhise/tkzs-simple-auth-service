<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>鉴权限流管理后台</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <header class="topbar">
    <div>
      <h1>鉴权限流管理后台</h1>
      <p>统一鉴权、服务治理、限流与健康状态</p>
    </div>
    <button id="logoutBtn" class="ghost">退出</button>
  </header>

  <main>
    <section class="panel login-panel" id="loginPanel">
      <h2>登录</h2>
      <form id="loginForm">
        <label>用户名<input id="username" autocomplete="username" required></label>
        <label>密码<input id="password" type="password" autocomplete="current-password" required></label>
        <button type="submit">登录</button>
      </form>
    </section>

    <section class="workspace hidden" id="workspace">
      <nav class="tabs" id="tabs">
        <button data-view="users" class="active">用户</button>
        <button data-view="apps">APP</button>
        <button data-view="roles">角色</button>
        <button data-view="oidc">OIDC</button>
        <button data-view="services">服务</button>
        <button data-view="logs">日志</button>
        <button data-view="statistics">统计</button>
        <button data-view="health">健康</button>
      </nav>
      <section class="panel">
        <div class="section-head">
          <h2 id="viewTitle">用户</h2>
          <button id="refreshBtn">刷新</button>
        </div>
        <pre id="output"></pre>
      </section>
    </section>
  </main>

  <script src="./app.js"></script>
</body>
</html>
