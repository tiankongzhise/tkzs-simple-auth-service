<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>鉴权限流管理后台</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <header class="topbar">
    <div>
      <h1>鉴权限流管理后台</h1>
      <p>统一鉴权、服务治理、限流规则与运行状态</p>
    </div>
    <div class="top-actions">
      <span id="sessionState" class="session-state">未登录</span>
      <button id="logoutBtn" class="ghost hidden" type="button">退出</button>
    </div>
  </header>

  <main>
    <section class="panel login-panel" id="loginPanel">
      <h2>登录</h2>
      <form id="loginForm" class="form-grid">
        <label>用户名<input id="username" autocomplete="username" required></label>
        <label>密码<input id="password" type="password" autocomplete="current-password" required></label>
        <button type="submit">登录</button>
      </form>
      <p id="loginMessage" class="message"></p>
    </section>

    <section class="workspace hidden" id="workspace">
      <nav class="tabs" id="tabs"></nav>
      <section class="panel work-panel">
        <div class="section-head">
          <div>
            <h2 id="viewTitle">用户</h2>
            <p id="viewMeta"></p>
          </div>
          <div class="actions">
            <button id="createBtn" type="button">新增</button>
            <button id="refreshBtn" class="ghost" type="button">刷新</button>
          </div>
        </div>

        <form id="filterForm" class="filters"></form>
        <div id="alert" class="alert hidden"></div>
        <div class="table-wrap">
          <table>
            <thead id="tableHead"></thead>
            <tbody id="tableBody"></tbody>
          </table>
        </div>
      </section>
    </section>
  </main>

  <dialog id="modal">
    <form method="dialog" class="modal-card" id="modalForm">
      <div class="modal-head">
        <h3 id="modalTitle">编辑</h3>
        <button id="modalClose" class="icon ghost" type="button" aria-label="关闭">×</button>
      </div>
      <div id="modalBody" class="modal-body"></div>
      <div class="modal-actions">
        <button id="modalCancel" class="ghost" type="button">取消</button>
        <button id="modalSubmit" type="submit">保存</button>
      </div>
    </form>
  </dialog>

  <script src="./app.js"></script>
</body>
</html>
