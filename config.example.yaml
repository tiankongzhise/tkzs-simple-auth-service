server:
  host: "${AUTH_LIMIT_SERVER_HOST}"
  port: ${AUTH_LIMIT_SERVER_PORT}
  run_mode: "${AUTH_LIMIT_RUN_MODE}"

service:
  code: "${AUTH_LIMIT_SERVICE_CODE}"
  name: "${AUTH_LIMIT_SERVICE_NAME}"
  version: "${AUTH_LIMIT_SERVICE_VERSION}"

postgres:
  dsn: "${AUTH_LIMIT_POSTGRES_DSN}"
  max_open_conns: 20
  max_idle_conns: 10
  conn_max_lifetime_seconds: 300

redis:
  addr: "${AUTH_LIMIT_REDIS_ADDR}"
  username: "${AUTH_LIMIT_REDIS_USERNAME}"
  password: "${AUTH_LIMIT_REDIS_PASSWORD}"
  db: ${AUTH_LIMIT_REDIS_DB}
  dial_timeout: "500ms"
  read_timeout: "1s"
  write_timeout: "1s"
  pool_size: 20

jwt:
  issuer: "${AUTH_LIMIT_JWT_ISSUER}"
  access_expire_minutes: 30
  refresh_expire_hours: 24
  auto_refresh_before_minutes: 5
  private_key_path: "${AUTH_LIMIT_JWT_PRIVATE_KEY_PATH}"
  public_key_path: "${AUTH_LIMIT_JWT_PUBLIC_KEY_PATH}"
  refresh_rotate: true

oidc:
  enable: true
  issuer: "${AUTH_LIMIT_OIDC_ISSUER}"
  authorization_code_expire_minutes: 5
  access_token_expire_minutes: 30
  refresh_token_expire_hours: 24

limit:
  enable: true
  default_capacity: 100
  default_rate_per_second: 10
  dimensions:
    - ip
    - user_id
    - app_id
  local_fallback_capacity: 50
  local_fallback_rate_per_second: 5

security:
  auth_fail_max_count: 5
  auth_fail_window_minutes: 10
  lock_minutes: 15
  m2m_timestamp_skew_seconds: 30
  password_bcrypt_cost: 12

health:
  default_path: "/health"
  default_interval_seconds: 30
  min_interval_seconds: 10
  max_interval_seconds: 300
  unhealthy_threshold: 3

ui:
  enable: true
  path_prefix: "/ui/"
